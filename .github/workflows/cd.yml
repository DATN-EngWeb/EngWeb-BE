name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-to-vm:
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy via SSH to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/EngWeb-BE

            echo "Stopping containers before git pull..."
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml down || true

            echo "Sleeping for 10 seconds..."
            sleep 10

            echo "Pulling latest code..."
            git pull origin main

            echo "Starting containers..."
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d

            echo "Waiting 30s for containers to settle..."
            sleep 30

            echo "Verifying container status..."
            if docker compose -f docker-compose.yaml -f docker-compose.prod.yaml ps backend | grep -q "Up"; then
              echo "Backend container is running. Deployment successful!"
              docker compose -f docker-compose.yaml -f docker-compose.prod.yaml ps
              exit 0
            fi

            echo "Backend container is NOT running!"
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml ps
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml logs --tail=100 backend
            exit 1
