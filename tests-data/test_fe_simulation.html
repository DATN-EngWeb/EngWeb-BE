<!DOCTYPE html>
<html>
  <head>
    <title>Receptive Test Upload - Frontend Simulation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: 50px auto;
      }
      .section {
        margin: 20px 0;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      textarea {
        width: 100%;
        height: 300px;
        font-family: monospace;
        font-size: 12px;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }
      .log {
        margin: 10px 0;
        padding: 10px;
        background: #f5f5f5;
        border-left: 3px solid #007bff;
      }
      #progress {
        margin: 10px 0;
      }
      .progress-bar {
        width: 100%;
        height: 30px;
        background: #e9ecef;
        border-radius: 5px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #28a745;
        width: 0%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Receptive Test Chunked Upload - Frontend Simulation</h1>

    <div class="section">
      <h2>Configuration</h2>
      <label>
        Base URL:
        <input
          type="text"
          id="baseUrl"
          value="http://localhost:8000/api"
          style="width: 400px"
        />
      </label>
      <br /><br />
      <label>
        Test ID:
        <input type="number" id="testId" value="2" style="width: 100px" />
      </label>
      <br /><br />
      <label>
        Access Token:
        <input
          type="text"
          id="token"
          value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzY3NDkyNzU5LCJpYXQiOjE3Njc0OTA5NTksImp0aSI6IjNkNTY1NzdlZjRkOTQ3ODNhMTNhMWMwMTExMTBmMmQzIiwidXNlcl9pZCI6IjEwMjQiLCJyb2xlIjoiVCJ9.I1zvTBx-grHnTgs45DX8TG2j3UQkFLfbfRGBz9PYdXg"
          style="width: 400px"
        />
      </label>
      <br /><br />
      <label>
        Chunk Size (KB):
        <input type="number" id="chunkSize" value="10" style="width: 100px" />
      </label>
    </div>

    <div class="section">
      <h2>Step 1: Create Multipart Payload</h2>
      <button onclick="createPayload()">Create Payload</button>
      <div id="payloadInfo"></div>
      <textarea
        id="payloadPreview"
        readonly
        placeholder="Payload preview will appear here..."
      ></textarea>
    </div>

    <div class="section">
      <h2>Step 2: Upload Chunks</h2>
      <button onclick="startUpload()">Start Upload</button>
      <div id="progress"></div>
      <div id="uploadLog"></div>
    </div>

    <div class="section">
      <h2>Response</h2>
      <textarea
        id="response"
        readonly
        placeholder="Server response will appear here..."
      ></textarea>
    </div>

    <script>
      let fullPayload = null;
      let chunks = [];
      let uploadId = null;

      function createSamplePng() {
        // Minimal valid PNG (8x8 pixels, transparent)
        const pngBase64 =
          "iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllMwAAABdJREFUeNpi+s9QzwABYBxVSF0HDQAJM0/6jZ+I/gAAAABJRU5ErkJggg==";
        const byteCharacters = atob(pngBase64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        return new Uint8Array(byteNumbers);
      }

      function createPayload() {
        const testData = {
          parts: [
            {
              order: 1,
              format: "F",
              description: "Part 1: Reading Comprehension",
              content:
                "<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>",
              questions: [
                {
                  question_number: 1,
                  content: "What is the main topic of this passage?",
                  explanation: "The main topic is about Lorem ipsum text.",
                  score: 10,
                  resources: { image: "question_1.png" },
                  answers: [
                    {
                      option_label: "A",
                      answer_text: "Lorem ipsum",
                      is_correct: true,
                      resources: { image: "answer_1a.png" },
                    },
                    {
                      option_label: "B",
                      answer_text: "Other option",
                      is_correct: false,
                      resources: {},
                    },
                  ],
                },
              ],
            },
          ],
        };

        // Create multipart payload
        const boundary = "----WebKitFormBoundary" + generateRandomString(16);
        const lines = [];

        // Add data field
        lines.push("--" + boundary);
        lines.push('Content-Disposition: form-data; name="data"');
        lines.push("Content-Type: application/json");
        lines.push("");
        lines.push(JSON.stringify(testData));

        // Add image file 1
        lines.push("--" + boundary);
        lines.push(
          'Content-Disposition: form-data; name="chunk_data"; filename="question_1.png"'
        );
        lines.push("Content-Type: image/png");
        lines.push("");

        // Add image file 2
        lines.push("--" + boundary);
        lines.push(
          'Content-Disposition: form-data; name="chunk_data"; filename="answer_1a.png"'
        );
        lines.push("Content-Type: image/png");
        lines.push("");

        lines.push("--" + boundary + "--");
        lines.push("");

        // Build payload with binary data
        const textPart = lines.join("\r\n");
        const pngData = createSamplePng();

        // Calculate positions
        const beforeFirstPng = textPart.indexOf(
          "Content-Type: image/png\r\n\r\n"
        );
        const afterFirstPng =
          textPart.indexOf("\r\n--" + boundary, beforeFirstPng) + 2;

        // Create full payload with PNG data
        const encoder = new TextEncoder();
        const textBytes = encoder.encode(textPart);

        // Build complete payload
        fullPayload = new Uint8Array(
          textBytes.length + pngData.length * 2 + 100
        );
        let offset = 0;

        // Add text before first PNG
        const beforePng = textPart.substring(0, beforeFirstPng + 26);
        const afterPngStart = textPart.substring(beforeFirstPng + 26);

        const beforePngBytes = encoder.encode(beforePng);
        fullPayload.set(beforePngBytes, offset);
        offset += beforePngBytes.length;

        fullPayload.set(pngData, offset);
        offset += pngData.length;

        const afterFirstPngBytes = encoder.encode(
          "\r\n--" +
            boundary +
            '\r\nContent-Disposition: form-data; name="chunk_data"; filename="answer_1a.png"\r\nContent-Type: image/png\r\n\r\n'
        );
        fullPayload.set(afterFirstPngBytes, offset);
        offset += afterFirstPngBytes.length;

        fullPayload.set(pngData, offset);
        offset += pngData.length;

        const endBytes = encoder.encode("\r\n--" + boundary + "--\r\n");
        fullPayload.set(endBytes, offset);
        offset += endBytes.length;

        fullPayload = fullPayload.slice(0, offset);

        document.getElementById("payloadInfo").innerHTML = `
                <div class="log success">
                    <strong>Payload created successfully!</strong><br>
                    Size: ${fullPayload.length} bytes<br>
                    Boundary: ${boundary}
                </div>
            `;

        const preview = textPart.substring(0, 500) + "...[binary PNG data]...";
        document.getElementById("payloadPreview").value = preview;

        // Divide into chunks
        const chunkSizeKB = parseInt(
          document.getElementById("chunkSize").value
        );
        const chunkSizeBytes = chunkSizeKB * 1024;
        chunks = [];

        for (let i = 0; i < fullPayload.length; i += chunkSizeBytes) {
          chunks.push(fullPayload.slice(i, i + chunkSizeBytes));
        }

        document.getElementById("payloadInfo").innerHTML += `
                <div class="log">
                    Divided into <strong>${chunks.length}</strong> chunks (${chunkSizeKB}KB each)
                </div>
            `;
      }

      async function startUpload() {
        if (!fullPayload) {
          alert("Please create payload first!");
          return;
        }

        const baseUrl = document.getElementById("baseUrl").value;
        const testId = document.getElementById("testId").value;
        const token = document.getElementById("token").value;

        uploadId = "fe_" + generateRandomString(16);
        const totalChunks = chunks.length;

        document.getElementById("uploadLog").innerHTML = "";
        document.getElementById("response").value = "";

        for (let i = 0; i < chunks.length; i++) {
          const chunkNumber = i + 1;
          const chunkData = chunks[i];
          const isComplete = i === chunks.length - 1;

          await uploadChunk(
            baseUrl,
            testId,
            token,
            uploadId,
            chunkNumber,
            totalChunks,
            chunkData,
            isComplete
          );

          // Update progress
          const progress = Math.round((chunkNumber / totalChunks) * 100);
          document.getElementById("progress").innerHTML = `
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%;">${progress}%</div>
                    </div>
                `;

          // Small delay between chunks
          await new Promise((resolve) => setTimeout(resolve, 100));
        }
      }

      async function uploadChunk(
        baseUrl,
        testId,
        token,
        uploadId,
        chunkNumber,
        totalChunks,
        chunkData,
        isComplete
      ) {
        const url = `${baseUrl}/tests/receptive/${testId}`;

        const headers = {
          "X-Upload-ID": uploadId,
          "X-Chunk-Number": chunkNumber.toString(),
          "X-Total-Chunks": totalChunks.toString(),
          "X-Is-Complete": isComplete ? "true" : "false",
          "Content-Type": "application/octet-stream",
        };

        if (token) {
          headers["Authorization"] = `Bearer ${token}`;
        }

        const logDiv = document.getElementById("uploadLog");
        const log = document.createElement("div");
        log.className = "log";
        log.innerHTML = `<strong>Chunk ${chunkNumber}/${totalChunks}</strong> (${chunkData.length} bytes) - Uploading...`;
        logDiv.appendChild(log);

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: headers,
            body: chunkData,
          });

          const data = await response.json();

          if (
            response.ok ||
            response.status === 202 ||
            response.status === 201
          ) {
            log.className = "log success";
            log.innerHTML = `
                        <strong>Chunk ${chunkNumber}/${totalChunks}</strong> (${
              chunkData.length
            } bytes)<br>
                        Status: ${response.status}<br>
                        Response: ${JSON.stringify(data, null, 2)}
                    `;
            document.getElementById("response").value = JSON.stringify(
              data,
              null,
              2
            );
          } else {
            log.className = "log error";
            log.innerHTML = `
                        <strong>Chunk ${chunkNumber}/${totalChunks}</strong> - ERROR<br>
                        Status: ${response.status}<br>
                        Response: ${JSON.stringify(data, null, 2)}
                    `;
            document.getElementById("response").value = JSON.stringify(
              data,
              null,
              2
            );
          }
        } catch (error) {
          log.className = "log error";
          log.innerHTML = `
                    <strong>Chunk ${chunkNumber}/${totalChunks}</strong> - ERROR<br>
                    ${error.message}
                `;
        }
      }

      function generateRandomString(length) {
        const chars = "0123456789abcdef";
        let result = "";
        for (let i = 0; i < length; i++) {
          result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
      }
    </script>
  </body>
</html>
