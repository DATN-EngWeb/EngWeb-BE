services:
  backend:
    build: .
    container_name: english_app_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./test-nens-english-app-sa-key.json:/app/test-nens-english-app-sa-key.json:ro
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    container_name: english_app_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:8.4
    container_name: english_app_cache
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:


