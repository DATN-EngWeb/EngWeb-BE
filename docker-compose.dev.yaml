services:
  backend:
    env_file:
      - .env.dev
    command: ["/bin/bash", "/app/entrypoint.dev.sh"]
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    container_name: english_app_db
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    env_file:
      - .env.dev

volumes:
  db_data:
